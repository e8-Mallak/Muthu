<style>
:root{--navy:#1F3864;--blue:#1F6DB5;--bg:#f0f3f8;--card:#fff;--border:#dde3ed;--text:#1a2340;--sub:#6b7a93;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);}

.topbar{background:linear-gradient(120deg,#1F3864 0%,#1b5496 100%);
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.topbar h1{color:#fff;font-size:17px;font-weight:700;}
.topbar p{color:rgba(255,255,255,.65);font-size:11px;margin-top:3px;}
.topbar-right{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:5px 14px;color:#fff;font-size:11px;font-weight:600;}
.badge.live{background:rgba(39,200,120,.25);border-color:rgba(39,200,120,.5);}

/* loading overlay */
#loadOverlay{position:fixed;inset:0;background:rgba(31,56,100,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .4s;}
#loadOverlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadMsg{color:#fff;font-size:15px;font-weight:600;}
#loadSub{color:rgba(255,255,255,.6);font-size:12px;margin-top:8px;}

.filter-bar{background:#fff;border-bottom:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.filter-bar label{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;}
.filter-bar select,.filter-bar input[type=text]{
  padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;
  font-size:12px;color:var(--text);background:var(--bg);outline:none;cursor:pointer;}
.filter-bar select:focus,.filter-bar input[type=text]:focus{border-color:var(--blue);}
.btn-f{padding:6px 16px;background:var(--navy);color:#fff;border:none;
  border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s;}
.btn-f:hover{background:var(--blue);}
.btn-refresh{padding:6px 16px;background:#27652a;color:#fff;border:none;
  border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:background .2s;}
.btn-refresh:hover{background:#1e4d20;}
.sep{width:1px;height:24px;background:var(--border);}
#matchCount{font-size:11px;color:var(--sub);margin-left:auto;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
  gap:18px;padding:20px 20px 32px;}
.chart-card{background:var(--card);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(31,56,100,.06);
  transition:box-shadow .2s;border-top:4px solid #ccc;}
.chart-card:hover{box-shadow:0 4px 18px rgba(31,56,100,.13);}

.card-head{padding:11px 14px 9px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.rm-name{font-size:12px;font-weight:700;color:var(--navy);line-height:1.3;}
.rm-sub{font-size:10px;color:var(--sub);margin-top:2px;}
.trend-badge{flex-shrink:0;padding:3px 9px;border-radius:12px;
  font-size:10px;font-weight:700;white-space:nowrap;}

.kpi-row{display:grid;border-bottom:1px solid var(--border);}
.kpi{padding:7px 6px;text-align:center;border-right:1px solid #eef1f6;}
.kpi:last-child{border-right:none;}
.kpi-m{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;font-weight:600;}
.kpi-v{font-size:13px;font-weight:700;color:var(--navy);margin-top:2px;}
.kpi-v.na{color:#bbb;font-weight:400;font-size:11px;}
.kpi-d{font-size:9px;margin-top:1px;}
.kpi-d.up{color:#C0392B;}.kpi-d.dn{color:#27652a;}
.kpi-d.flat{color:var(--sub);}.kpi-d.base{color:var(--blue);}

.canvas-wrap{padding:10px 10px 4px;height:185px;position:relative;}
.no-data{display:flex;align-items:center;justify-content:center;height:100%;font-size:12px;color:#bbb;}

.card-legend{display:flex;gap:14px;padding:0 12px 8px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sub);}
.leg-box{width:10px;height:10px;border-radius:2px;}
.leg-line{width:18px;height:2.5px;border-radius:2px;}

/* status bar */
.status-bar{background:#fff;border-top:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.status-dot.ok{background:#27a745;box-shadow:0 0 6px rgba(39,167,69,.5);}
.status-dot.err{background:#dc3545;}
.status-dot.loading{background:#ffc107;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#statusText{font-size:12px;color:var(--sub);}
#statusText.ok{color:#27652a;font-weight:600;}
#statusText.err{color:#C0392B;}
#lastRefresh{font-size:11px;color:#aaa;margin-left:auto;}

#noResults{display:none;text-align:center;padding:48px 20px;color:var(--sub);font-size:14px;}
@media(max-width:520px){.grid{grid-template-columns:1fr;padding:12px;}.topbar{padding:12px 16px;}}

// ── CSV PARSER (handles quoted commas) ───────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n");
  return lines.map(line => {
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

// ── LIVE DATA LOADER ─────────────────────────────────────────────────────────
async function loadLiveData(showOverlay=true) {
  if (showOverlay) showLoading("Fetching live data from Google Sheets…");
  setStatus("loading", "Connecting to Google Sheets…");

  // Try direct URL first, then gviz fallback
  const urls = [
    SHEET_CSV_URL,
    SHEET_CSV_URL.replace("pub?", "gviz/tq?tqx=out:csv&").replace("&single=true&output=csv","")
  ];

  let parsed = null;
  let lastErr = "";

  for (const url of urls) {
    try {
      const resp = await fetch(url, {cache: "no-cache"});
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      const text = await resp.text();
      const rows = parseCSV(text);
      if (rows.length < 2) throw new Error("Empty sheet");

      // Headers: first col = RM name, rest = months
      const headers = rows[0];
      const monthHeaders = headers.slice(1).map(h => h.replace(/"/g,"").trim()).filter(h => h);

      // Parse data rows
      const data = [];
      for (let i = 1; i < rows.length; i++) {
        const cols = rows[i];
        const name = (cols[0]||"").replace(/"/g,"").trim();
        if (!name) continue;
        const prices = monthHeaders.map((_, mi) => {
          const raw = (cols[mi+1]||"").replace(/"/g,"").trim();
          const n = parseFloat(raw);
          return isNaN(n) ? null : n;
        });
        if (prices.some(p => p !== null)) data.push({name, prices});
      }

      if (data.length === 0) throw new Error("No valid data rows");

      // Success
      parsed = {months: monthHeaders, data};
      break;
    } catch(e) {
      lastErr = e.message;
    }
  }

  if (parsed) {
    // Update globals
    MONTHS.length = 0;
    parsed.months.forEach(m => MONTHS.push(m));
    currentData = parsed.data;

    // Update month selectors
    populateMonthSelects();

    // Build charts
    buildGrid(currentData, 0, MONTHS.length-1, "", "all");

    // Update UI
    document.getElementById("hBadge").textContent = currentData.length + " Raw Materials";
    document.getElementById("hDate").textContent = "🟢 Live";
    setStatus("ok", "✅ Live data loaded — " + currentData.length +
      " RMs across " + MONTHS.length + " months");
    document.getElementById("lastRefresh").textContent =
      "Last refreshed: " + new Date().toLocaleTimeString("en-IN", {hour:"2-digit",minute:"2-digit"}) +
      ", " + new Date().toLocaleDateString("en-IN");
  } else {
    // Fallback to screenshot data
    MONTHS.length = 0;
    FALLBACK_MONTHS.forEach(m => MONTHS.push(m));
    currentData = FALLBACK_DATA;
    populateMonthSelects();
    buildGrid(currentData, 0, MONTHS.length-1, "", "all");
    document.getElementById("hBadge").textContent = currentData.length + " Raw Materials";
    document.getElementById("hDate").textContent = "⚠️ Offline";
    setStatus("err", "⚠️ Could not reach Google Sheet (" + lastErr +
      ") — showing last known data. Check sheet is published.");
    document.getElementById("lastRefresh").textContent = "Using offline fallback data";
  }

  hideLoading();
}

}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getBase(prices){ for(let p of prices) if(p!==null) return p; return null; }
function calcIdx(p,base){ return p===null||base===null?null:+(p/base*100).toFixed(1); }
function calcMoM(prices,i){
  if(i===0) return null;
  if(prices[i]===null||prices[i-1]===null) return null;
  return +((prices[i]-prices[i-1])/prices[i-1]*100).toFixed(1);
}
function getTrend(rm,from,to){
  const base=rm.prices[from]; if(base===null) return "new";
  let last=null;
  for(let i=to;i>=from;i--) if(rm.prices[i]!==null){last=rm.prices[i];break;}
  if(last===null) return "new";
  const d=last-base;
  if(Math.abs(d)<0.01) return "flat";
  return d>0?"up":"down";
}
function trendLabel(rm,from,to){
  const trend=getTrend(rm,from,to);
  if(trend==="new") return "New Entry";
  const base=rm.prices[from]; let last=null;
  for(let i=to;i>=from;i--) if(rm.prices[i]!==null){last=rm.prices[i];break;}
  if(last===null||base===null) return "—";
  const pct=+((last-base)/base*100).toFixed(1);
  return (pct>=0?"+":"")+pct+"% overall";
}
function momCls(v){return v===null?"flat":v>0?"up":v<0?"dn":"flat";}

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);this.closePath();
  };
}

// ── PILL LABEL PLUGIN ─────────────────────────────────────────────────────────
const pillPlugin={
  id:"pills",
  afterDatasetsDraw(chart){
    const {ctx}=chart;
    const pal=chart._pal||{bar:"#1F6DB5",line:"#E24B4A"};
    chart.data.datasets.forEach((ds,di)=>{
      const meta=chart.getDatasetMeta(di);
      if(!meta.visible) return;
      meta.data.forEach((el,i)=>{
        const val=ds.data[i];
        if(val===null||val===undefined) return;
        const fSize=9; const x=el.x;
        let y,txt,bg;
        if(di===0){
          y=el.y-7; txt=val+"%"; bg=pal.bar;
        } else {
          if(val===null) return;
          y=el.y-12;
          txt=(val>=0?"+":"")+val+"%";
          bg=pal.line;
        }
        ctx.save();
        ctx.font=`700 ${fSize}px Arial`;
        const tw=ctx.measureText(txt).width;
        const pad=3.5,bw=tw+pad*2,bh=fSize+pad*1.8;
        const bx=x-bw/2,by=y-bh;
        ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);
        ctx.fillStyle=bg;ctx.fill();
        ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(txt,x,by+bh/2);
        ctx.restore();
      });
    });
  }
};
Chart.register(pillPlugin);

// ── RENDER ONE CARD ───────────────────────────────────────────────────────────
function renderCard(rm, palIdx, from, to, cardEl){
  const pal    = PALETTES[palIdx % PALETTES.length];
  const months = MONTHS.slice(from, to+1);
  const prices = rm.prices.slice(from, to+1);
  const base   = getBase(prices);
  const indices= prices.map(p=>calcIdx(p,base));
  const moms   = prices.map((p,i)=>calcMoM(prices,i));
  const trend  = getTrend(rm,from,to);
  const tLabel = trendLabel(rm,from,to);
  const tCls   = trend==="up"?"trend-up":trend==="down"?"trend-down":
                 trend==="flat"?"trend-flat":"trend-new";

  cardEl.style.borderTopColor = pal.border;

  // Dynamic KPI columns
  const kpiCols = months.length;
  const kpiHtml = prices.map((p,i)=>{
    const mom=moms[i];
    const momTxt=i===0?"Base":(mom===null?"N/A":(mom>=0?"+":"")+mom+"%");
    const mCls=i===0?"base":momCls(mom);
    // shorten month label
    const mLabel = months[i].replace(" 2026","").replace(" 20","'");
    return `<div class="kpi">
      <div class="kpi-m">${mLabel}</div>
      <div class="kpi-v${p===null?" na":""}">${p===null?"N/A":"₹"+p}</div>
      <div class="kpi-d ${mCls}">${momTxt}</div>
    </div>`;
  }).join("");

  const canvasId = "cv_" + palIdx + "_" + Date.now();

  cardEl.innerHTML = `
    <div class="card-head">
      <div>
        <div class="rm-name">${rm.name}</div>
        <div class="rm-sub">Base ₹${base!==null?base:"—"} &nbsp;|&nbsp; ${months[0]}–${months[months.length-1]}</div>
      </div>
      <div class="trend-badge ${tCls}" style="background:${pal.badgeBg};color:${pal.badgeFt};">${tLabel}</div>
    </div>
    <div class="kpi-row" style="grid-template-columns:repeat(${kpiCols},1fr);">${kpiHtml}</div>
    <div class="canvas-wrap">
      ${base!==null
        ? `<canvas id="${canvasId}" height="165"></canvas>`
        : `<div class="no-data">No data available for this range</div>`}
    </div>
    ${base!==null ? `
    <div class="card-legend">
      <div class="leg"><div class="leg-box" style="background:${pal.bar}"></div>Index vs Base (%)</div>
      <div class="leg"><div class="leg-line" style="background:${pal.line}"></div>MoM Change (%)</div>
    </div>` : ""}`;

  if (base===null) return;
  const cvEl = document.getElementById(canvasId);
  if (!cvEl) return;

  const c = new Chart(cvEl, {
    data:{
      labels: months,
      datasets:[
        {
          type:"bar", label:"Index vs Base (%)",
          data: indices,
          backgroundColor: indices.map(v => v===null?"rgba(0,0,0,0)":pal.bar),
          hoverBackgroundColor: indices.map(v => v===null?"rgba(0,0,0,0)":pal.bar+"cc"),
          borderRadius:4, yAxisID:"y", order:2,
        },
        {
          type:"line", label:"MoM Change (%)",
          data: moms,
          borderColor: pal.line,
          backgroundColor: pal.line+"18",
          borderWidth:2.5,
          pointBackgroundColor: moms.map(v=>v===null?"transparent":pal.line),
          pointBorderColor: moms.map(v=>v===null?"transparent":"#fff"),
          pointBorderWidth:1.5,
          pointRadius: moms.map(v=>v===null?0:5),
          tension:0.35, yAxisID:"y2", order:1, spanGaps:true,
        }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:"#1F3864", padding:10, cornerRadius:7,
          callbacks:{
            title: items => {
              const i=items[0].dataIndex;
              return months[i]+"  —  "+(prices[i]!==null?"₹"+prices[i]:"N/A");
            },
            label: item => {
              if(item.datasetIndex===0)
                return item.raw!==null?" Index: "+item.raw+"%":" Index: N/A";
              return item.raw===null?" MoM: —":" MoM: "+(item.raw>=0?"+":"")+item.raw+"%";
            }
          }
        }
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10,weight:"600"},color:"#1a2340"}},
        y:{
          position:"left",
          title:{display:true,text:"Index (%)",color:pal.bar,font:{size:9}},
          ticks:{callback:v=>v+"%",color:pal.bar,font:{size:9}},
          grid:{color:"rgba(0,0,0,0.06)"}
        },
        y2:{
          position:"right",
          title:{display:true,text:"MoM %",color:pal.line,font:{size:9}},
          ticks:{callback:v=>(v>=0?"+":"")+v+"%",color:pal.line,font:{size:9}},
          grid:{display:false}
        }
      },
      animation:{duration:500}
    }
  });
  c._pal = pal;
  chartInstances[canvasId] = c;
}

// ── BUILD GRID ────────────────────────────────────────────────────────────────
function buildGrid(data, from, to, search, trendF){
  const grid   = document.getElementById("chartGrid");
  const noRes  = document.getElementById("noResults");
  Object.values(chartInstances).forEach(c=>c.destroy());
  chartInstances={}; grid.innerHTML="";
  const term=(search||"").toLowerCase().trim();
  let shown=0, palIdx=0;
  data.forEach(rm=>{
    const slice=rm.prices.slice(from,to+1);
    if(!slice.some(p=>p!==null)) return;
    if(term&&!rm.name.toLowerCase().includes(term)) return;
    const trend=getTrend(rm,from,to);
    if(trendF!=="all"&&trend!==trendF) return;
    const card=document.createElement("div");
    card.className="chart-card";
    grid.appendChild(card);
    renderCard(rm, palIdx, from, to, card);
    palIdx++; shown++;
  });
  document.getElementById("matchCount").textContent=shown+" RM"+(shown!==1?"s":"")+" shown";
  noRes.style.display=shown===0?"block":"none";
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function applyFilters(){
  let from=parseInt(document.getElementById("fromMonth").value||0);
  let to  =parseInt(document.getElementById("toMonth").value||0);
  if(to<from){to=from;document.getElementById("toMonth").value=from;}
  buildGrid(currentData,from,to,
    document.getElementById("searchInput").value,
    document.getElementById("trendFilter").value);
}
function resetFilters(){
  document.getElementById("searchInput").value="";
  document.getElementById("fromMonth").value="0";
  document.getElementById("toMonth").value=String(MONTHS.length-1);
  document.getElementById("trendFilter").value="all";
  buildGrid(currentData,0,MONTHS.length-1,"","all");
}
