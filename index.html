<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mallak Specialties — RM Cost Dashboard 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--navy:#1F3864;--blue:#1F6DB5;--bg:#f0f3f8;--card:#fff;--border:#dde3ed;--text:#1a2340;--sub:#6b7a93;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);}

#loadOverlay{position:fixed;inset:0;background:rgba(31,56,100,.96);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
#loadOverlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:52px;height:52px;border:4px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:22px;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadMsg{color:#fff;font-size:15px;font-weight:700;text-align:center;}
#loadSub{color:rgba(255,255,255,.6);font-size:12px;margin-top:8px;text-align:center;max-width:380px;line-height:1.7;}

.topbar{background:linear-gradient(120deg,#1F3864 0%,#1b5496 100%);
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.topbar h1{color:#fff;font-size:17px;font-weight:700;}
.topbar p{color:rgba(255,255,255,.65);font-size:11px;margin-top:3px;}
.topbar-right{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:5px 14px;color:#fff;font-size:11px;font-weight:600;}
.badge.live{background:rgba(39,200,120,.25);border-color:rgba(39,200,120,.5);}
.badge.warn{background:rgba(255,193,7,.25);border-color:rgba(255,193,7,.5);}

.status-bar{background:#1a2a1a;border-bottom:2px solid #2d4a2d;
  padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.status-dot.ok{background:#3fb950;box-shadow:0 0 8px rgba(63,185,80,.6);}
.status-dot.err{background:#f85149;}
.status-dot.loading{background:#ffc107;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#statusMsg{font-size:12px;font-weight:600;color:#c9d1d9;}
#statusMsg.ok{color:#3fb950;}#statusMsg.err{color:#f85149;}
#statusTs{font-size:11px;color:#6b7a93;margin-left:auto;}
.btn-reload{padding:6px 16px;background:#238636;color:#fff;border:none;
  border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-reload:hover{background:#2ea043;}
.btn-reload:disabled{background:#444;cursor:not-allowed;}
.spin-i{display:inline-block;}.spin-i.go{animation:spin .8s linear infinite;}

.filter-bar{background:#fff;border-bottom:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.filter-bar label{font-size:11px;font-weight:700;color:var(--navy);
  text-transform:uppercase;letter-spacing:.5px;}
.filter-bar select,.filter-bar input[type=text]{
  padding:6px 10px;border:1.5px solid var(--border);border-radius:6px;
  font-size:12px;color:var(--text);background:var(--bg);outline:none;cursor:pointer;}
.filter-bar select:focus,.filter-bar input[type=text]:focus{border-color:var(--blue);}
.btn-f{padding:6px 16px;background:var(--navy);color:#fff;border:none;
  border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
.btn-f:hover{background:var(--blue);}
.sep{width:1px;height:24px;background:var(--border);}
#matchCount{font-size:11px;color:var(--sub);margin-left:auto;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
  gap:18px;padding:20px 20px 32px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;box-shadow:0 2px 8px rgba(31,56,100,.06);
  transition:box-shadow .2s;border-top:4px solid #ccc;}
.chart-card:hover{box-shadow:0 6px 22px rgba(31,56,100,.14);}
.card-head{padding:11px 14px 9px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.rm-name{font-size:12px;font-weight:700;color:var(--navy);line-height:1.3;}
.rm-sub{font-size:10px;color:var(--sub);margin-top:2px;}
.trend-badge{flex-shrink:0;padding:3px 9px;border-radius:12px;
  font-size:10px;font-weight:700;white-space:nowrap;}
.kpi-row{display:grid;border-bottom:1px solid var(--border);}
.kpi{padding:7px 6px;text-align:center;border-right:1px solid #eef1f6;}
.kpi:last-child{border-right:none;}
.kpi-m{font-size:9px;color:var(--sub);text-transform:uppercase;
  letter-spacing:.4px;font-weight:600;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;}
.kpi-v{font-size:13px;font-weight:700;color:var(--navy);margin-top:2px;}
.kpi-v.na{color:#bbb;font-weight:400;font-size:11px;}
.kpi-d{font-size:9px;margin-top:1px;}
.kpi-d.up{color:#C0392B;}.kpi-d.dn{color:#27652a;}
.kpi-d.flat{color:var(--sub);}.kpi-d.base{color:var(--blue);}
.canvas-wrap{padding:10px 10px 4px;height:185px;position:relative;}
.no-data{display:flex;align-items:center;justify-content:center;
  height:100%;font-size:12px;color:#bbb;}
.card-legend{display:flex;gap:14px;padding:0 12px 8px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sub);}
.leg-box{width:10px;height:10px;border-radius:2px;}
.leg-line{width:18px;height:2.5px;border-radius:2px;}

.err-box{grid-column:1/-1;background:#fff;border:1px solid #f5c6cb;
  border-left:5px solid #dc3545;border-radius:10px;padding:24px 28px;}
.err-box h3{color:#721c24;font-size:14px;font-weight:700;margin-bottom:10px;}
.err-box p{font-size:12px;color:#555;line-height:1.9;}
.err-box code{background:#f0f0f0;padding:2px 5px;border-radius:3px;font-size:11px;}

#noResults{display:none;text-align:center;padding:48px 20px;
  color:var(--sub);font-size:14px;}
@media(max-width:520px){.grid{grid-template-columns:1fr;padding:12px;}
  .topbar{padding:12px 16px;}}
</style>
</head>
<body>

<div id="loadOverlay">
  <div class="spinner"></div>
  <div id="loadMsg">Fetching live data from Google Sheets…</div>
  <div id="loadSub">Reading your "Chart Data" tab via Apps Script</div>
</div>

<div class="topbar">
  <div>
    <h1>Mallak Specialties — RM Cost Dashboard</h1>
    <p id="topSub">Connecting to Google Sheets — All Raw Materials per kg rate</p>
  </div>
  <div class="topbar-right">
    <div class="badge" id="hBadge">Loading…</div>
    <div class="badge live" id="hLive">🟢 Live</div>

</div>

<div class="status-bar">
  <div class="status-dot loading" id="sDot"></div>
  <span id="statusMsg">Connecting…</span>
  <button class="btn-reload" id="reloadBtn" onclick="loadLiveData(false)">
    <span class="spin-i" id="spinI">🔄</span> Reload from Sheet

  <span id="statusTs"></span>

  <label>Search RM</label>
  <input type="text" id="searchInput" placeholder="e.g. Copper, Ammonia…"
    oninput="applyFilters()" style="width:180px">

  <label>From</label><select id="fromMonth" onchange="applyFilters()"></select>
  <label>To</label><select id="toMonth" onchange="applyFilters()"></select>

  <label>Trend</label>
  <select id="trendFilter" onchange="applyFilters()">
    <option value="all">All</option>
    <option value="up">Rising ↑</option>
    <option value="down">Falling ↓</option>
    <option value="flat">Stable →</option>
    <option value="new">New Entry</option>
  </select>
  <button class="btn-f" onclick="resetFilters()">Reset</button>
  <span id="matchCount"></span>
</div>

<div class="grid" id="chartGrid"></div>
<div id="noResults">No raw materials match your filters.</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  APPS SCRIPT URL
// ─────────────────────────────────────────────────────────────────────────────
const APPS_URL = "https://script.google.com/macros/s/AKfycby-I1Wqmh8w1CjZ5jqr49NfdjNEhXrB1gTMa3fXHjA-y-PG1mPW83UUgbAROfkd__Ld/exec";

// ─────────────────────────────────────────────────────────────────────────────
//  CONVERT ANY DATE FORMAT → clean month label
//  Handles: "Feb 2026", "February 2026", "2026-01-31T18:30:00.000Z",
//           Date objects, Excel serial numbers
// ─────────────────────────────────────────────────────────────────────────────
const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function cleanMonthLabel(val) {
  if (!val && val !== 0) return null;
  const s = String(val).trim();
  if (s === "" || s === "0") return null;

  // Already looks like "Feb 2026" or "April 2026" — return as-is
  if (/^[A-Za-z]/.test(s) && s.length > 3) return s;

  // ISO date string "2026-01-31T18:30:00.000Z"
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    try {
      const d = new Date(s);
      if (!isNaN(d.getTime())) return MON[d.getUTCMonth()] + " " + d.getUTCFullYear();
    } catch(e) {}
  }

  // Excel serial number (e.g. 46053)
  if (/^\d{4,6}$/.test(s)) {
    try {
      const d = new Date(Math.round((parseInt(s) - 25569) * 86400 * 1000));
      if (!isNaN(d.getTime()) && d.getFullYear() > 2000)
        return MON[d.getUTCMonth()] + " " + d.getUTCFullYear();
    } catch(e) {}
  }

  return s; // return whatever it is
}

// ─────────────────────────────────────────────────────────────────────────────
//  PARSE PRICE — handles numbers, strings, empty
// ─────────────────────────────────────────────────────────────────────────────
function parsePrice(cell) {
  if (cell === "" || cell === null || cell === undefined) return null;
  if (typeof cell === "number") return cell === 0 ? null : cell;
  const s = String(cell).trim();
  if (s === "" || s === "0") return null;
  const n = parseFloat(s.replace(/[^0-9.\-]/g, ""));
  return isNaN(n) || n === 0 ? null : n;
}

// ─────────────────────────────────────────────────────────────────────────────
//  34 UNIQUE COLOUR PALETTES
// ─────────────────────────────────────────────────────────────────────────────
const PAL=[
  {bar:"#1565C0",line:"#FF6F00",bd:"#1565C0",bg:"#E3F2FD",ft:"#0D47A1"},
  {bar:"#2E7D32",line:"#F50057",bd:"#2E7D32",bg:"#E8F5E9",ft:"#1B5E20"},
  {bar:"#6A1B9A",line:"#00BFA5",bd:"#6A1B9A",bg:"#F3E5F5",ft:"#4A148C"},
  {bar:"#C62828",line:"#FDD835",bd:"#C62828",bg:"#FFEBEE",ft:"#B71C1C"},
  {bar:"#00695C",line:"#E64A19",bd:"#00695C",bg:"#E0F2F1",ft:"#004D40"},
  {bar:"#F57F17",line:"#283593",bd:"#F57F17",bg:"#FFFDE7",ft:"#E65100"},
  {bar:"#37474F",line:"#E91E63",bd:"#37474F",bg:"#ECEFF1",ft:"#263238"},
  {bar:"#558B2F",line:"#6200EA",bd:"#558B2F",bg:"#F1F8E9",ft:"#33691E"},
  {bar:"#00838F",line:"#D84315",bd:"#00838F",bg:"#E0F7FA",ft:"#006064"},
  {bar:"#4527A0",line:"#00C853",bd:"#4527A0",bg:"#EDE7F6",ft:"#311B92"},
  {bar:"#AD1457",line:"#00ACC1",bd:"#AD1457",bg:"#FCE4EC",ft:"#880E4F"},
  {bar:"#1976D2",line:"#388E3C",bd:"#1976D2",bg:"#E3F2FD",ft:"#0D47A1"},
  {bar:"#E65100",line:"#1A237E",bd:"#E65100",bg:"#FBE9E7",ft:"#BF360C"},
  {bar:"#00796B",line:"#C2185B",bd:"#00796B",bg:"#E0F2F1",ft:"#004D40"},
  {bar:"#283593",line:"#F9A825",bd:"#283593",bg:"#E8EAF6",ft:"#1A237E"},
  {bar:"#BF360C",line:"#0097A7",bd:"#BF360C",bg:"#FBE9E7",ft:"#870000"},

  {bar:"#880E4F",line:"#69F0AE",bd:"#880E4F",bg:"#FCE4EC",ft:"#560027"},
  {bar:"#0277BD",line:"#FF6D00",bd:"#0277BD",bg:"#E1F5FE",ft:"#01579B"},
  {bar:"#33691E",line:"#AA00FF",bd:"#33691E",bg:"#F1F8E9",ft:"#1B4000"},
  {bar:"#4E342E",line:"#00E676",bd:"#4E342E",bg:"#EFEBE9",ft:"#3E2723"},
  {bar:"#006064",line:"#FF1744",bd:"#006064",bg:"#E0F7FA",ft:"#003D40"},
  {bar:"#4A148C",line:"#FFAB00",bd:"#4A148C",bg:"#F3E5F5",ft:"#12005E"},
  {bar:"#01579B",line:"#76FF03",bd:"#01579B",bg:"#E1F5FE",ft:"#002f6c"},
  {bar:"#827717",line:"#E040FB",bd:"#827717",bg:"#F9FBE7",ft:"#524c00"},
  {bar:"#B71C1C",line:"#00BFA5",bd:"#B71C1C",bg:"#FFEBEE",ft:"#7F0000"},
  {bar:"#0D47A1",line:"#FF6F00",bd:"#0D47A1",bg:"#E3F2FD",ft:"#002171"},
  {bar:"#004D40",line:"#FF4081",bd:"#004D40",bg:"#E0F2F1",ft:"#00251a"},
  {bar:"#263238",line:"#FFEA00",bd:"#263238",bg:"#ECEFF1",ft:"#000a12"},
  {bar:"#870000",line:"#00E5FF",bd:"#870000",bg:"#FFEBEE",ft:"#4a0000"},
  {bar:"#1A237E",line:"#F4511E",bd:"#1A237E",bg:"#E8EAF6",ft:"#000051"},
  {bar:"#006400",line:"#FF8F00",bd:"#006400",bg:"#E8F5E9",ft:"#003000"},
  {bar:"#7B1FA2",line:"#1DE9B6",bd:"#7B1FA2",bg:"#F3E5F5",ft:"#4a0072"},
  {bar:"#BF6900",line:"#0091EA",bd:"#BF6900",bg:"#FFF8E1",ft:"#7a4200"},
];

let MONTHS=[], currentData=[], chartInstances={}, _seq=0;

// ─────────────────────────────────────────────────────────────────────────────
//  MAIN DATA LOADER
// ─────────────────────────────────────────────────────────────────────────────
async function loadLiveData(overlay=true) {
  if (overlay) {
    document.getElementById("loadOverlay").classList.remove("hidden");
    document.getElementById("loadMsg").textContent = "Fetching live data from Google Sheets…";
    document.getElementById("loadSub").textContent = "Reading your Chart Data tab via Apps Script";
  }
  setStatus("loading","Connecting to Google Sheets…");
  document.getElementById("reloadBtn").disabled = true;
  document.getElementById("spinI").classList.add("go");

  const url = APPS_URL + "?_ts=" + Date.now(); // cache buster

  try {
    const resp = await fetch(url, {cache:"no-store"});
    if (!resp.ok) throw new Error("HTTP " + resp.status +
      " — Redeploy Apps Script with 'Anyone' access");

    const raw = await resp.text();
    if (!raw || raw.trim() === "") throw new Error("Empty response from Apps Script");

    // Parse JSON
    let rows;
    try { rows = JSON.parse(raw); }
    catch(e) { throw new Error("Not valid JSON. Raw: " + raw.substring(0,120)); }

    if (!Array.isArray(rows) || rows.length < 2)
      throw new Error("Expected 2D array. Got: " + JSON.stringify(rows).substring(0,80));

    // ─── FIND HEADER ROW ────────────────────────────────────────────────────
    // Your sheet: Row 0 = "Sheet updation SOP" (skip)
    //             Row 1 = "Main Raw Material Name", "Feb 2026", "April 2026"...
    // We find the row where column A contains "main raw material"
    let headerRowIdx = -1;
    for (let i = 0; i < Math.min(rows.length, 6); i++) {
      const cellA = String(rows[i][0] || "").toLowerCase().trim();
      if (cellA.includes("main raw material") || cellA.includes("raw material name")) {
        headerRowIdx = i;
        break;
      }
    }

    // Fallback: if not found, assume row index 1
    if (headerRowIdx === -1) {
      console.warn("Header row not found by keyword — using row index 1 as fallback");
      headerRowIdx = 1;
    }

    const headerRow = rows[headerRowIdx];

    // ─── EXTRACT MONTH LABELS ────────────────────────────────────────────────
    // Convert any format (text / ISO date / Excel serial) → clean label
    const monthLabels = headerRow
      .slice(1)
      .map(h => cleanMonthLabel(h))
      .filter(h => h !== null && h !== "");

    if (monthLabels.length === 0)
      throw new Error("No month columns found. Header: " + JSON.stringify(headerRow));

    // ─── PARSE DATA ROWS ─────────────────────────────────────────────────────
    // Rows after headerRowIdx that have a valid RM name in col A
    // Skip: empty rows, rows with "Om ", "Namah", "SOP", etc.
    const skipPatterns = [
      /^om\s/i, /namah/i, /parvatay/i, /keshav/i, /narayan/i,
      /madhav/i, /sheet\s*updation/i, /^main\s*raw/i
    ];

    const data = [];
    for (let i = headerRowIdx + 1; i < rows.length; i++) {
      const row  = rows[i];
      const name = String(row[0] || "").trim();
      if (!name) continue;
      if (skipPatterns.some(p => p.test(name))) continue;

      const prices = monthLabels.map((_, mi) => parsePrice(row[mi + 1]));

      // Only include rows that have at least one price
      if (prices.some(p => p !== null)) {
        data.push({ name, prices });
      }
    }

    if (data.length === 0)
      throw new Error("No RM rows found with prices. Check Apps Script SHEET_NAME = 'Chart Data'");

    // ─── SUCCESS ─────────────────────────────────────────────────────────────
    MONTHS.length = 0;
    monthLabels.forEach(m => MONTHS.push(m));
    currentData = data;

    populateSelects();
    buildGrid(currentData, 0, MONTHS.length - 1, "", "all");

    document.getElementById("hBadge").textContent  = data.length + " Raw Materials";
    document.getElementById("hLive").textContent   = "🟢 Live";
    document.getElementById("hLive").className     = "badge live";
    document.getElementById("topSub").textContent  =
      "All RM per kg rate  |  Base = first available price  |  " +
      MONTHS.length + " months: " + MONTHS[0] + " → " + MONTHS[MONTHS.length-1] +
      "  |  🟢 Auto-synced from Google Sheets";

    const ts = new Date().toLocaleTimeString("en-IN",
      {hour:"2-digit",minute:"2-digit",second:"2-digit"}) +
      "  " + new Date().toLocaleDateString("en-IN");

    setStatus("ok", "✅ Live — " + data.length + " RMs loaded  |  Months: " +
      MONTHS.join(" · "));
    document.getElementById("statusTs").textContent = "Refreshed: " + ts;

  } catch(err) {
    console.error("Live load failed:", err.message);
    setStatus("err", "❌ " + err.message);
    document.getElementById("hBadge").textContent = "⚠️ Error";
    document.getElementById("hLive").textContent  = "❌ Offline";
    document.getElementById("hLive").className    = "badge warn";
    document.getElementById("topSub").textContent = "❌ Could not load — check Apps Script";

    document.getElementById("chartGrid").innerHTML = `
      <div class="err-box">
        <h3>❌ Could not load data from Google Sheets</h3>
        <p>
          <b>Error:</b> ${err.message}<br><br>
          <b>Quick checklist:</b><br>
          1. Open Google Sheet → Extensions → Apps Script<br>
          2. Make sure code has <code>var SHEET_NAME = "Chart Data"</code><br>
          3. Click <b>Deploy → New deployment → Web app → Anyone → Deploy</b><br>
          4. Also try opening the Apps Script URL directly in a new tab to verify it returns JSON
        </p>
      </div>`;
  }

  document.getElementById("reloadBtn").disabled = false;
  document.getElementById("spinI").classList.remove("go");
  document.getElementById("loadOverlay").classList.add("hidden");
}

function setStatus(type, msg) {
  document.getElementById("sDot").className = "status-dot " + type;
  const el = document.getElementById("statusMsg");
  el.textContent = msg; el.className = type;
}

function populateSelects() {
  ["fromMonth","toMonth"].forEach(id => {
    const s = document.getElementById(id);
    s.innerHTML = MONTHS.map((m,i) => `<option value="${i}">${m}</option>`).join("");
  });
  document.getElementById("toMonth").value = MONTHS.length - 1;
}

// ─────────────────────────────────────────────────────────────────────────────
//  CALCULATION HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function getBase(p){for(let v of p)if(v!==null)return v;return null;}
function calcIdx(p,b){return p===null||b===null?null:+(p/b*100).toFixed(1);}
function calcMoM(prices,i){
  if(i===0||prices[i]===null||prices[i-1]===null)return null;
  return+((prices[i]-prices[i-1])/prices[i-1]*100).toFixed(1);
}
function getTrend(rm,from,to){
  const b=rm.prices[from];if(b===null)return"new";
  let l=null;for(let i=to;i>=from;i--)if(rm.prices[i]!==null){l=rm.prices[i];break;}
  if(l===null)return"new";const d=l-b;
  return Math.abs(d)<0.01?"flat":d>0?"up":"down";
}
function trendLbl(rm,from,to){
  const t=getTrend(rm,from,to);if(t==="new")return"New Entry";
  const b=rm.prices[from];let l=null;
  for(let i=to;i>=from;i--)if(rm.prices[i]!==null){l=rm.prices[i];break;}
  if(l===null||b===null)return"—";
  const p=+((l-b)/b*100).toFixed(1);return(p>=0?"+":"")+p+"% overall";
}
function mCls(v){return v===null?"flat":v>0?"up":v<0?"dn":"flat";}

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);this.closePath();
  };
}

// ─────────────────────────────────────────────────────────────────────────────
//  PILL LABEL PLUGIN
// ─────────────────────────────────────────────────────────────────────────────
Chart.register({id:"pills",afterDatasetsDraw(chart){
  const{ctx}=chart,p=chart._p||{bar:"#1F6DB5",line:"#E24B4A"};
  chart.data.datasets.forEach((ds,di)=>{
    const meta=chart.getDatasetMeta(di);if(!meta.visible)return;
    meta.data.forEach((el,i)=>{
      const v=ds.data[i];if(v===null||v===undefined)return;
      const fs=9,x=el.x;let y,txt,bg;
      if(di===0){y=el.y-7;txt=v+"%";bg=p.bar;}
      else{if(v===null)return;y=el.y-12;txt=(v>=0?"+":"")+v+"%";bg=p.line;}
      ctx.save();ctx.font=`700 ${fs}px Arial`;
      const tw=ctx.measureText(txt).width,pd=3.5;
      const bw=tw+pd*2,bh=fs+pd*1.8,bx=x-bw/2,by=y-bh;
      ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);
      ctx.fillStyle=bg;ctx.fill();
      ctx.fillStyle="#fff";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(txt,x,by+bh/2);ctx.restore();
    });
  });
}});

// ─────────────────────────────────────────────────────────────────────────────
//  RENDER ONE CARD
// ─────────────────────────────────────────────────────────────────────────────
function renderCard(rm,pi,from,to,cardEl){
  const p=PAL[pi%PAL.length];
  const months=MONTHS.slice(from,to+1);
  const prices=rm.prices.slice(from,to+1);
  const base=getBase(prices);
  const indices=prices.map(v=>calcIdx(v,base));
  const moms=prices.map((v,i)=>calcMoM(prices,i));
  const trend=getTrend(rm,from,to);
  const tCls={up:"trend-up",down:"trend-down",flat:"trend-flat",new:"trend-new"}[trend];
  const cid="cv_"+(++_seq);
  cardEl.style.borderTopColor=p.bd;

  const kpi=prices.map((v,i)=>{
    const mom=moms[i];
    const momTxt=i===0?"Base":(mom===null?"N/A":(mom>=0?"+":"")+mom+"%");
    return`<div class="kpi">
      <div class="kpi-m">${months[i]}</div>
      <div class="kpi-v${v===null?" na":""}">${v===null?"N/A":"₹"+v}</div>
      <div class="kpi-d ${i===0?"base":mCls(mom)}">${momTxt}</div>
    </div>`;
  }).join("");

  cardEl.innerHTML=`
    <div class="card-head">
      <div>
        <div class="rm-name">${rm.name}</div>
        <div class="rm-sub">Base ₹${base??'—'} | ${months[0]} → ${months[months.length-1]}</div>
      </div>
      <div class="trend-badge ${tCls}" style="background:${p.bg};color:${p.ft};">
        ${trendLbl(rm,from,to)}</div>
    </div>
    <div class="kpi-row" style="grid-template-columns:repeat(${months.length},1fr);">${kpi}</div>
    <div class="canvas-wrap">
      ${base!==null
        ? `<canvas id="${cid}" height="165"></canvas>`
        : `<div class="no-data">No data for selected range</div>`}
    </div>
    ${base!==null?`<div class="card-legend">
      <div class="leg"><div class="leg-box" style="background:${p.bar}"></div>Index vs Base (%)</div>
      <div class="leg"><div class="leg-line" style="background:${p.line}"></div>MoM Change (%)</div>
    </div>`:""}`;

  if(base===null)return;
  const cvEl=document.getElementById(cid);if(!cvEl)return;

  const c=new Chart(cvEl,{
    data:{labels:months,datasets:[
      {type:"bar",label:"Index vs Base (%)",data:indices,
        backgroundColor:indices.map(v=>v===null?"rgba(0,0,0,0)":p.bar),
        hoverBackgroundColor:indices.map(v=>v===null?"rgba(0,0,0,0)":p.bar+"cc"),
        borderRadius:4,yAxisID:"y",order:2},
      {type:"line",label:"MoM Change (%)",data:moms,
        borderColor:p.line,backgroundColor:p.line+"18",borderWidth:2.5,
        pointBackgroundColor:moms.map(v=>v===null?"transparent":p.line),
        pointBorderColor:moms.map(v=>v===null?"transparent":"#fff"),
        pointBorderWidth:1.5,pointRadius:moms.map(v=>v===null?0:5),
        tension:0.35,yAxisID:"y2",order:1,spanGaps:true}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:false},
        tooltip:{backgroundColor:"#1F3864",padding:10,cornerRadius:7,
          callbacks:{
            title:items=>{const i=items[0].dataIndex;
              return months[i]+"  —  "+(prices[i]!==null?"₹"+prices[i]:"N/A");},
            label:item=>{
              if(item.datasetIndex===0)
                return item.raw!==null?" Index: "+item.raw+"%":" Index: N/A";
              return item.raw===null?" MoM: —":
                " MoM: "+(item.raw>=0?"+":"")+item.raw+"%";}}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10,weight:"600"},color:"#1a2340"}},
        y:{position:"left",
          title:{display:true,text:"Index (%)",color:p.bar,font:{size:9}},
          ticks:{callback:v=>v+"%",color:p.bar,font:{size:9}},
          grid:{color:"rgba(0,0,0,0.06)"}},
        y2:{position:"right",
          title:{display:true,text:"MoM %",color:p.line,font:{size:9}},
          ticks:{callback:v=>(v>=0?"+":"")+v+"%",color:p.line,font:{size:9}},
          grid:{display:false}}},
      animation:{duration:400}}
  });
  c._p=p; chartInstances[cid]=c;
}

// ─────────────────────────────────────────────────────────────────────────────
//  BUILD GRID
// ─────────────────────────────────────────────────────────────────────────────
function buildGrid(data,from,to,search,trendF){
  const grid=document.getElementById("chartGrid");
  Object.values(chartInstances).forEach(c=>c.destroy());
  chartInstances={};grid.innerHTML="";_seq=0;
  const term=(search||"").toLowerCase().trim();
  let shown=0,pi=0;
  data.forEach(rm=>{
    const sl=rm.prices.slice(from,to+1);
    if(!sl.some(p=>p!==null))return;
    if(term&&!rm.name.toLowerCase().includes(term))return;
    const t=getTrend(rm,from,to);
    if(trendF!=="all"&&t!==trendF)return;
    const card=document.createElement("div");
    card.className="chart-card";grid.appendChild(card);
    renderCard(rm,pi,from,to,card);pi++;shown++;
  });
  document.getElementById("matchCount").textContent=
    shown+" RM"+(shown!==1?"s":"")+" shown";
  document.getElementById("noResults").style.display=shown===0?"block":"none";
}

function applyFilters(){
  let from=parseInt(document.getElementById("fromMonth").value||0);
  let to=parseInt(document.getElementById("toMonth").value||0);
  if(to<from){to=from;document.getElementById("toMonth").value=from;}
  buildGrid(currentData,from,to,
    document.getElementById("searchInput").value,
    document.getElementById("trendFilter").value);
}
function resetFilters(){
  document.getElementById("searchInput").value="";
  document.getElementById("fromMonth").value="0";
  document.getElementById("toMonth").value=String(MONTHS.length-1);
  document.getElementById("trendFilter").value="all";
  buildGrid(currentData,0,MONTHS.length-1,"","all");
}

//  INIT
// ─────────────────────────────────────────────────────────────────────────────
loadLiveData(true);
</script>
